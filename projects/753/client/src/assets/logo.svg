<svg width="120" height="32" viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="appLogoTitle appLogoDesc">
  <title id="appLogoTitle">App Placeholder Logo</title>
  <desc id="appLogoDesc">Minimal placeholder logo used in the application header.</desc>
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="120%" y2="120%">
      <stop offset="0%" stop-color="#2563EB"/>
