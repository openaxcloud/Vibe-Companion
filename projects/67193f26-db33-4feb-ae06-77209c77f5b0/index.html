<!-- filename: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Messaging</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        #chatContainer { display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; border-bottom: 1px solid #ddd; }
        #inputContainer { display: flex; }
        #messageInput { flex: 1; padding: 10px; border: 1px solid #ddd; }
        #sendButton { padding: 10px; border: 1px solid #ddd; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chatContainer">
        <div id="messages"></div>
        <div id="inputContainer">
            <input id="messageInput" type="text" placeholder="Type a message..." />
            <button id="sendButton">Send</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://localhost:8080');
        const messages = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        ws.onmessage = (event) => {
            const message = document.createElement('div');
            message.textContent = event.data;
            messages.appendChild(message);
        };

        sendButton.onclick = () => {
            const message = messageInput.value;
            ws.send(message);
            messageInput.value = '';
        };

        messageInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                sendButton.click();
            }
        });
    </script>
</body>
</html>
