name: Verify Codex PRs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50  # Fetch enough history for PR analysis
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Codex PR Verification
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash scripts/verify-codex-prs.sh 10
      
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-audit-report
          path: reports/codex-audits/*.md
          retention-days: 30
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reports = fs.readdirSync('reports/codex-audits');
            const latestReport = reports.sort().reverse()[0];
            const reportContent = fs.readFileSync(`reports/codex-audits/${latestReport}`, 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Codex PR Verification Failed\n\n${reportContent}`
            });
