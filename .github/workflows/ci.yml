name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=8192"
  HUSKY: "0"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  typecheck:
    name: Typecheck (non-blocking, baseline-tracked)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Run tsc and report error count
        run: |
          set +e
          npx tsc --noEmit 2>&1 | tee /tmp/tsc.log
          COUNT=$(grep -c "error TS" /tmp/tsc.log || true)
          echo "tsc-errors=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice title=TypeScript errors::$COUNT errors (baseline ~3781, see CLAUDE.md)"
        id: tsc

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm test --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run build
