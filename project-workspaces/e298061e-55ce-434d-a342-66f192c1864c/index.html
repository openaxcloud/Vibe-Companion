<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 text-white font-sans">
  <header class="bg-slate-800 shadow-xl px-6 py-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center space-x-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12l9-9 9 9-7 7H9l-7-7z"></path><path d="M12 12v10"></path></svg>
      <h1 class="text-4xl font-bold">My Personal Blog</h1>
    </div>
    <nav class="flex space-x-4">
      <a href="#" class="text-lg hover:underline">Home</a>
      <a href="#" class="text-lg hover:underline">Blog</a>
      <a href="#" class="text-lg hover:underline">About</a>
    </nav>
  </header>

  <main class="px-6 py-12 max-w-4xl mx-auto">
    <h2 class="text-3xl font-bold mb-4 border-b border-gray-700 pb-2">Welcome to My Blog</h2>
    <div id="content" class="bg-white/10 rounded-xl p-6 shadow-lg backdrop-blur-sm">
      <!-- Markdown content rendered here -->
      <p class="text-lg">This is where your blog posts will appear.</p>
      <pre class="language-js mb-4"><code>// Example code block
function sayHello() {
  console.log("Hello, world!");
}</code></pre>
    </div>

    <button class="mt-6 bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:scale-105 hover:shadow-lg transition-all duration-200">
      Read More
    </button>
  </main>

  <footer class="bg-slate-800 mt-12 py-6 text-center text-gray-400 text-sm">
    © 2023 My Personal Blog • All Rights Reserved
  </footer>

  <script>
    const contentElement = document.getElementById('content');
    // Example of fetching and rendering markdown (placeholder logic)
    fetch('/example-post.md')
      .then(response => response.text())
      .then(markdown => {
        // Convert Markdown to HTML (using a library like marked.js if needed)
        contentElement.innerHTML = `<p class="text-lg animate-fade-in">${markdown}</p>`;
        Prism.highlightAll(); // Syntax highlighting
      });
  </script>
</body>
</html>
