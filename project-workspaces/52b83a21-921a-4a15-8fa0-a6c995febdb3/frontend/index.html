<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Messaging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/socket.io-client/dist/socket.io.min.js"></script>
</head>
<body class="bg-slate-900 text-white">
    <div class="container mx-auto p-4">
        <h1 class="text-4xl font-bold">Real-time Messaging Platform</h1>
        <div id="messages" class="bg-gray-800 rounded-lg p-4 mb-4 h-64 overflow-y-auto"></div>
        <input id="messageInput" class="border rounded px-2 py-1" type="text" placeholder="Type your message..." />
        <button id="sendMessage" class="bg-blue-500 text-white rounded px-4 py-2">Send</button>
    </div>
    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendMessageButton = document.getElementById('sendMessage');

        // Send message to server
        sendMessageButton.addEventListener('click', () => {
            const message = messageInput.value;
            socket.emit('message', message);
            messageInput.value = '';
        });

        // Receive messages from server
        socket.on('message', (message) => {
            const messageElement = document.createElement('div');
            messageElement.textContent = message;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>
</body>
</html>
